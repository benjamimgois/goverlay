name: AppImage & Packages CI

on:
  push:
    paths-ignore: ["**/README.md"]
  pull_request:
    paths-ignore: ["**/README.md"]
  workflow_dispatch: {}

jobs:
  build:
    name: "Build Packages (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    container: ghcr.io/pkgforge-dev/archlinux:latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Get dependencies
        run: |
          chmod +x ./appimage/get-dependencies.sh
          ./appimage/get-dependencies.sh

      - name: Build GOverlay
        run: |
          make LAZBUILDOPTS=--lazarusdir=/usr/lib/lazarus
          make prefix=/usr libexecdir=/lib install

      - name: Make Packages (AppImage, DEB, RPM)
        run: |
          VERSION="$(echo "$GITHUB_SHA" | cut -c 1-9)"
          [ -z "$VERSION" ] && VERSION="nightly"
          export VERSION

          # Build AppImage
          chmod +x ./appimage/goverlay-appimage.sh
          ./appimage/goverlay-appimage.sh

          # Build Debian Package
          chmod +x ./packaging/deb/build-deb.sh
          ./packaging/deb/build-deb.sh "$VERSION"

          # Build RPM Package
          chmod +x ./packaging/rpm/build-rpm.sh
          ./packaging/rpm/build-rpm.sh "$VERSION"

          # Organize artifacts
          mkdir ./dist
          sha256sum *.AppImage* *.deb *.rpm || true
          mv *.AppImage* *.deb *.rpm ./dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppImage-${{ matrix.arch }}
          path: "dist"

  build-flatpak:
    name: Build Flatpak Bundle (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub repository
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak SDK and runtime
        run: |
          sudo flatpak install -y flathub org.kde.Platform//6.10 org.kde.Sdk//6.10
          sudo flatpak install -y flathub io.qt.qtwebengine.BaseApp//6.10
          sudo flatpak install -y flathub org.freedesktop.Sdk.Extension.freepascal//25.08

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --force-clean \
            --repo=flatpak-repo \
            --disable-rofiles-fuse \
            --ccache \
            --state-dir=.flatpak-builder \
            flatpak-build \
            flatpak/io.github.benjamimgois.goverlay.nightly.yml

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle \
            flatpak-repo \
            goverlay-nightly-${{ matrix.arch }}.flatpak \
            io.github.benjamimgois.goverlay

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle-${{ matrix.arch }}
          path: goverlay-nightly-${{ matrix.arch }}.flatpak
          retention-days: 90

  release_nightly:
    name: "nightly release"
    needs: [build, build-flatpak]
    permissions:
      actions: read
      security-events: write
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: AppImage-x86_64
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: AppImage-aarch64
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle-x86_64
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle-aarch64
          path: .

      - name: Show downloaded artifacts
        run: ls -la

      - name: Delete previous pre-release
        if: ${{ github.ref_name == 'main' }}
        run: |
          gh release delete "nightly" --repo "${GITHUB_REPOSITORY}" --cleanup-tag -y
          sleep 5
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        continue-on-error: true

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        if: ${{ github.ref_name == 'main' }}
        with:
          name: "Goverlay Nightly"
          tag_name: "nightly"
          prerelease: true
          draft: false
          generate_release_notes: true
          make_latest: false
          files: |
            *.AppImage*
            *.deb
            *.rpm
            *.flatpak
